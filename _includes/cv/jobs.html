{% assign jobs = site.data.jobs %}
{% assign js = "" | split "," %}

{% for job in jobs %}
  {% assign js = js | push: job[1] %}
{% endfor %}

<table id='jobs'>
{% for job in js %}
  <tr class="job-title"><th colspan='2'>{{ job.title }} at {{ job.company }}, {{ job.location }} {{ job.start }} => {{ job.end }}</th></tr>
{% endfor %}
</table>
