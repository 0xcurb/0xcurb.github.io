{% assign jobs = "" | split: "," %}

{% for job in site.data.jobs %}
  {% assign jobs = jobs | push: job[1] %}
{% endfor %}

<table id='jobs'>
{% for job in jobs | sort: "offset" | reverse %}
  <tr class="job-title"><th colspan='2'>{{ job.title }} at {{ job.company }}, {{ job.location }} {{ job.start }} => {{ job.end }}</th></tr>
{% endfor %}
</table>
